<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; box-sizing: border-box; }
        body {
            background: #222;
            background-image: linear-gradient(135deg, #00feba, #5b548a);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.8s ease; padding: 20px;
        }
        .weather-card {
            width: 100%; max-width: 450px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px); color: #fff;
            padding: 30px; border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .search { width: 100%; display: flex; align-items: center; margin-bottom: 20px; }
        .search input {
            border: 0; outline: 0; background: rgba(255, 255, 255, 0.2);
            color: #fff; padding: 10px 20px; height: 50px; border-radius: 30px;
            flex: 1; margin-right: 10px; font-size: 16px;
        }
        .search button {
            border: 0; outline: 0; background: #fff; border-radius: 50%;
            width: 50px; height: 50px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .search button img { width: 22px; pointer-events: none; }
        
        .history { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; justify-content: center; }
        .history-tag { background: rgba(255,255,255,0.2); padding: 5px 12px; border-radius: 15px; font-size: 12px; cursor: pointer; }

        .weather-icon { width: 100px; margin-top: 10px; }
        .temp { font-size: 60px; font-weight: 600; }
        .city { font-size: 30px; text-transform: capitalize; margin-bottom: 10px; }

        .details { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; 
            margin-top: 25px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); 
        }
        .col { display: flex; align-items: center; text-align: left; }
        .col img { width: 30px; margin-right: 10px; filter: invert(1); }
        .col p { font-size: 14px; font-weight: 500; }
        .col span { font-size: 11px; opacity: 0.7; display: block; }

        .forecast { display: flex; justify-content: space-between; margin-top: 25px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
        .forecast-item { text-align: center; font-size: 11px; }
        .forecast-item img { width: 35px; }
    </style>
</head>
<body>

    <div class="weather-card">
        <div class="search">
            <input type="text" placeholder="Enter City Name" id="cityInput">
            <button id="searchBtn">
                <img src="https://cdn-icons-png.flaticon.com/512/149/149852.png" alt="search">
            </button>
        </div>
        <div class="history" id="searchHistory"></div>
        <div class="weather">
            <img src="https://openweathermap.org/img/wn/01d@4x.png" class="weather-icon" id="weatherIcon">
            <h1 class="temp" id="tempText">--°c</h1>
            <h2 class="city" id="cityNameText">Search City</h2>
            <div class="details">
                <div class="col">
                    <img src="https://cdn-icons-png.flaticon.com/512/727/727790.png">
                    <div><p id="humidityText">--%</p><span>Humidity</span></div>
                </div>
                <div class="col">
                    <img src="https://cdn-icons-png.flaticon.com/512/483/483584.png">
                    <div><p id="windText">-- km/h</p><span>Wind</span></div>
                </div>
                <div class="col">
                    <img src="https://cdn-icons-png.flaticon.com/512/1839/1839341.png">
                    <div><p id="pressureText">-- hPa</p><span>Pressure</span></div>
                </div>
                <div class="col">
                    <img src="https://cdn-icons-png.flaticon.com/512/2100/2100100.png">
                    <div><p id="feelsLikeText">--°c</p><span>Feels Like</span></div>
                </div>
            </div>
            <div class="forecast" id="forecastContainer"></div>
        </div>
    </div>

    <script>
        const apiKey = "ae7c55fe0a0141b2a3ec26f36c819e9b"; 
        const searchBox = document.getElementById("cityInput");
        const searchBtn = document.getElementById("searchBtn");
        const historyContainer = document.getElementById("searchHistory");

        let history = JSON.parse(localStorage.getItem("weatherHistory")) || [];
        updateHistoryUI();

        async function checkWeather(city) {
            if (!city) return;
            try {
                const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?units=metric&q=${city}&appid=${apiKey}`);
                const data = await response.json();

                if (response.status == 404) {
                    alert("City not found!");
                    return;
                }

                document.getElementById("cityNameText").innerHTML = data.name;
                document.getElementById("tempText").innerHTML = Math.round(data.main.temp) + "°c";
                document.getElementById("humidityText").innerHTML = data.main.humidity + "%";
                document.getElementById("windText").innerHTML = data.wind.speed + " km/h";
                document.getElementById("pressureText").innerHTML = data.main.pressure + " hPa";
                document.getElementById("feelsLikeText").innerHTML = Math.round(data.main.feels_like) + "°c";
                document.getElementById("weatherIcon").src = `https://openweathermap.org/img/wn/${data.weather[0].icon}@2x.png`;

                updateBackground(data.weather[0].main);
                saveToHistory(data.name);
                getForecast(city);
            } catch (error) { console.log("Error:", error); }
        }

        async function getForecast(city) {
            const response = await fetch(`https://api.openweathermap.org/data/2.5/forecast?units=metric&q=${city}&appid=${apiKey}`);
            const data = await response.json();
            const forecastDiv = document.getElementById("forecastContainer");
            forecastDiv.innerHTML = "";
            for (let i = 0; i < data.list.length; i += 8) {
                const dayData = data.list[i];
                const date = new Date(dayData.dt_txt).toLocaleDateString('en', {weekday: 'short'});
                forecastDiv.innerHTML += `
                    <div class="forecast-item">
                        <p>${date}</p>
                        <img src="https://openweathermap.org/img/wn/${dayData.weather[0].icon}.png">
                        <p>${Math.round(dayData.main.temp)}°c</p>
                    </div>`;
            }
        }

        function saveToHistory(city) {
            if(!history.includes(city)){
                history.unshift(city);
                if(history.length > 3) history.pop();
                localStorage.setItem("weatherHistory", JSON.stringify(history));
                updateHistoryUI();
            }
        }

        function updateHistoryUI() {
            historyContainer.innerHTML = "";
            history.forEach(city => {
                const span = document.createElement("span");
                span.classList.add("history-tag");
                span.innerHTML = city;
                span.onclick = () => checkWeather(city);
                historyContainer.appendChild(span);
            });
        }

        function updateBackground(condition) {
            const bgMap = {
                "Clouds": "linear-gradient(135deg, #bdc3c7, #2c3e50)",
                "Clear": "linear-gradient(135deg, #f7b733, #fc4a1a)",
                "Rain": "linear-gradient(135deg, #005c97, #363795)",
                "Drizzle": "linear-gradient(135deg, #89f7fe, #66a6ff)",
                "Mist": "linear-gradient(135deg, #3e5151, #decba4)"
            };
            document.body.style.backgroundImage = bgMap[condition] || "linear-gradient(135deg, #00feba, #5b548a)";
        }

        // Search Button fix
        searchBtn.addEventListener("click", () => {
            checkWeather(searchBox.value);
        });

        searchBox.addEventListener("keypress", (e) => {
            if (e.key === "Enter") checkWeather(searchBox.value);
        });
    </script>
</body>
</html>
