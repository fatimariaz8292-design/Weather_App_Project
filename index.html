<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <title>AtmosView Professional</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
    body { font-family: 'Plus Jakarta Sans', sans-serif; transition: all 1s ease; min-height: 100vh; color: white; margin: 0; overflow-x: hidden; }
    
    /* Mausam ke mutabiq themes */
    .bg-clear { background: linear-gradient(135deg, #2e5984, #4a90e2); }
    .bg-clouds { background: linear-gradient(135deg, #374151, #6b7280); }
    .bg-rain { background: linear-gradient(135deg, #1e293b, #334155); } /* Rain Theme */
    .bg-haze { background: linear-gradient(135deg, #5d4037, #8d6e63); }

    .glass { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 2rem; }
  </style>
</head>
<body id="main-bg" class="bg-haze p-6 md:p-12">

  <div class="max-w-7xl mx-auto">
    <header class="text-center mb-12">
      <h1 class="text-7xl font-black italic tracking-tighter uppercase">AtmosView</h1>
    </header>

    <!-- Search Section -->
    <div class="flex flex-col md:flex-row gap-4 mb-12 justify-center items-center">
      <div class="relative w-full md:w-[600px]">
        <input id="city-input" type="text" placeholder="Search City..." class="w-full glass px-8 py-6 text-white outline-none text-xl">
      </div>
      <div class="flex gap-3">
        <button id="search-btn" class="glass px-10 py-6 font-black uppercase tracking-widest text-sm hover:bg-white/10 transition">Search</button>
        <button id="auto-locate-btn" class="glass px-6 py-6 hover:bg-white/10 transition"><i class="fas fa-crosshairs"></i></button>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
      <!-- Main Display -->
      <main class="lg:col-span-7 glass p-12 relative flex flex-col justify-center min-h-[450px]">
        <h2 id="display-city" class="text-7xl font-black tracking-tighter">---</h2>
        <div class="flex items-baseline mt-2">
          <span id="display-temp" class="text-[11rem] font-extrabold leading-none tracking-tighter">--</span>
          <span class="text-5xl font-light opacity-30 ml-4">°C</span>
        </div>
        <p id="display-desc" class="text-3xl font-semibold capitalize opacity-70 italic mt-4">---</p>
        <img id="display-icon" src="" class="absolute top-10 right-10 w-64 h-64 drop-shadow-2xl" alt="">
      </main>

      <!-- Sidebar -->
      <aside class="lg:col-span-5 flex flex-col gap-6">
        <!-- Healthy & Optimal Status -->
        <div class="grid grid-cols-2 gap-4">
            <div class="glass p-5 border-l-4 border-emerald-400">
                <p class="text-[10px] font-black opacity-40 uppercase">Air Quality</p>
                <p class="text-xl font-bold">Healthy</p>
            </div>
            <div class="glass p-5 border-l-4 border-yellow-400">
                <p class="text-[10px] font-black opacity-40 uppercase">UV Index</p>
                <p class="text-xl font-bold">Safe / Optimal</p>
            </div>
        </div>

        <!-- 8 Technical Features -->
        <div class="grid grid-cols-2 gap-4">
          <div class="glass p-5 text-center">
            <i class="fas fa-temperature-half text-orange-400 mb-1"></i>
            <p class="opacity-40 text-[9px] font-black uppercase">Feels Like</p>
            <span id="stat-feels" class="text-xl font-black">--°C</span>
          </div>
          <div class="glass p-5 text-center">
            <i class="fas fa-gauge-high text-blue-300 mb-1"></i>
            <p class="opacity-40 text-[9px] font-black uppercase">Pressure</p>
            <span id="stat-pressure" class="text-xl font-black">-- hPa</span>
          </div>
          <div class="glass p-5 text-center">
            <i class="fas fa-droplet text-blue-400 mb-1"></i>
            <p class="opacity-40 text-[9px] font-black uppercase">Humidity</p>
            <span id="stat-humidity" class="text-xl font-black">--%</span>
          </div>
          <div class="glass p-5 text-center">
            <i class="fas fa-wind text-indigo-300 mb-1"></i>
            <p class="opacity-40 text-[9px] font-black uppercase">Wind Speed</p>
            <span id="stat-wind" class="text-xl font-black">-- km/h</span>
          </div>
          <div class="glass p-5 text-center">
            <i class="fas fa-eye text-emerald-300 mb-1"></i>
            <p class="opacity-40 text-[9px] font-black uppercase">Visibility</p>
            <span id="stat-vis" class="text-xl font-black">-- km</span>
          </div>
          <div class="glass p-5 text-center">
            <i class="fas fa-cloud text-gray-300 mb-1"></i>
            <p class="opacity-40 text-[9px] font-black uppercase">Cloudiness</p>
            <span id="stat-clouds" class="text-xl font-black">--%</span>
          </div>
          <div class="glass p-5 text-center">
            <i class="fas fa-sun text-yellow-400 mb-1"></i>
            <p class="opacity-40 text-[9px] font-black uppercase">Sunrise</p>
            <span id="stat-sunrise" class="text-lg font-black">--:--</span>
          </div>
          <div class="glass p-5 text-center">
            <i class="fas fa-moon text-purple-300 mb-1"></i>
            <p class="opacity-40 text-[9px] font-black uppercase">Sunset</p>
            <span id="stat-sunset" class="text-lg font-black">--:--</span>
          </div>
        </div>
      </aside>
    </div>

    <!-- 5-Day Forecast -->
    <div id="forecast-container" class="grid grid-cols-2 md:grid-cols-5 gap-6 mt-10"></div>
  </div>

  <script>
    const API_KEY = '9ba95a597475d04073c505b3460c12ce';

    // 1. Auto-Location fetch on load
    window.onload = () => autoDetectLocation();

    function autoDetectLocation() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          pos => fetchWeatherData(`lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`),
          () => fetchWeatherData(`q=Shujabad,PK`) // Fallback
        );
      } else { fetchWeatherData(`q=Shujabad,PK`); }
    }

    async function fetchWeatherData(query) {
      try {
        const [wRes, fRes] = await Promise.all([
          fetch(`https://api.openweathermap.org/data/2.5/weather?${query}&units=metric&appid=${API_KEY}`),
          fetch(`https://api.openweathermap.org/data/2.5/forecast?${query}&units=metric&appid=${API_KEY}`)
        ]);
        const wData = await wRes.json();
        const fData = await fRes.json();
        updateUI(wData);
        updateForecast(fData);
      } catch (e) { console.error("Sync Error"); }
    }

    function updateUI(data) {
      document.getElementById('display-city').innerText = data.name;
      document.getElementById('display-temp').innerText = Math.round(data.main.temp);
      document.getElementById('display-desc').innerText = data.weather[0].description;
      document.getElementById('display-icon').src = `https://openweathermap.org/img/wn/${data.weather[0].icon}@4x.png`;
      
      document.getElementById('stat-feels').innerText = Math.round(data.main.feels_like) + "°C";
      document.getElementById('stat-pressure').innerText = data.main.pressure + " hPa";
      document.getElementById('stat-humidity').innerText = data.main.humidity + "%";
      document.getElementById('stat-wind').innerText = data.wind.speed + " km/h";
      document.getElementById('stat-vis').innerText = (data.visibility / 1000).toFixed(1) + " km";
      document.getElementById('stat-clouds').innerText = data.clouds.all + "%";

      const formatTime = (ts) => new Date(ts * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      document.getElementById('stat-sunrise').innerText = formatTime(data.sys.sunrise);
      document.getElementById('stat-sunset').innerText = formatTime(data.sys.sunset);

      // 2. Rain & Weather Theme Logic
      applyTheme(data.weather[0].main);
    }

    function applyTheme(condition) {
      const bg = document.getElementById('main-bg');
      bg.className = 'transition-all duration-1000 min-h-screen p-6 md:p-12 ';
      if (condition === 'Clear') bg.classList.add('bg-clear');
      else if (['Rain', 'Drizzle', 'Thunderstorm'].includes(condition)) bg.classList.add('bg-rain');
      else if (['Haze', 'Mist', 'Dust', 'Fog'].includes(condition)) bg.classList.add('bg-haze');
      else bg.classList.add('bg-clouds');
    }

    function updateForecast(data) {
      const container = document.getElementById('forecast-container');
      container.innerHTML = '';
      data.list.filter(f => f.dt_txt.includes("12:00:00")).slice(0,5).forEach(day => {
        container.innerHTML += `
          <div class="glass p-8 text-center bg-white/5 border-none">
            <p class="text-[10px] font-black opacity-40 uppercase mb-4">${new Date(day.dt*1000).toLocaleDateString('en-US', {weekday:'short'})}</p>
            <img src="https://openweathermap.org/img/wn/${day.weather[0].icon}@2x.png" class="mx-auto w-14" alt="">
            <p class="text-2xl font-black mt-2">${Math.round(day.main.temp)}°</p>
          </div>
        `;
      });
    }

    document.getElementById('search-btn').onclick = () => { 
      const val = document.getElementById('city-input').value; 
      if(val) fetchWeatherData(`q=${val}`); 
    };
    document.getElementById('auto-locate-btn').onclick = () => autoDetectLocation();
  </script>
</body>
</html>
